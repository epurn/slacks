# Alembic configuration for the Fatty backend (FTY-020).
#
# The database URL is intentionally NOT stored here. ``alembic/env.py`` resolves
# it from the application settings (``FATTY_DATABASE_URL``) so migrations and the
# app always agree on the target database and no credentials live in the repo.
[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# Migration filenames are prefixed with a zero-padded revision order for a
# readable, sortable history.
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

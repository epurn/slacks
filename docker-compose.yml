# Docker Compose stack for the Fatty backend (FTY-011, self-host setup FTY-072).
#
# Brings up Postgres, Redis, a one-shot Alembic migration runner, the FastAPI
# API, a Celery worker, and a private SearXNG search service (FTY-165) over plain
# HTTP:
#
#     cp .env.example .env           # copy template; fill in FATTY_AUTH_SECRET
#     docker compose up              # starts all services; migrations run first
#
# First-boot: the `migrate` service runs `alembic upgrade head` before the API
# and worker start, so the schema is ready without manual intervention.
#
# Self-host scope: HTTP-only local deployment. TLS / reverse proxy / HTTPS
# termination, production hardening, resource limits, and cloud deployment are
# intentionally out of scope. See the README self-host section for details.
#
# The real `.env` is gitignored; only `.env.example` is committed.
#
# Port exposure: postgres and redis are NOT published to host interfaces by
# default (FTY-109). The api, worker, and migrate services reach them over the
# internal compose network by service name. To enable direct host access for a
# DB GUI or local psql, add a loopback-only mapping under the relevant service:
#
#   ports:
#     - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"   # postgres
#     - "127.0.0.1:${REDIS_PORT:-6379}:6379"       # redis
#
# Binding to 127.0.0.1 limits access to the local machine; never use 0.0.0.0
# for datastore ports on a networked host. Alternatively, use:
#   docker compose exec postgres psql -U fatty fatty   # no host port needed
#
# SearXNG (FTY-165): a private, keyless metasearch service that backs the
# official-source search adapter (FTY-164). Like postgres and redis it is NOT
# published to the host — the api and worker reach it over the internal compose
# network at http://searxng:8080. The backend sends only sanitized item-identity
# queries (FTY-164); no personal context egresses to it. The default search
# config in .env.example points at this service, so search works out of the box
# with no API key. Search degrades gracefully (model-prior-with-status) if the
# service is down, so api/worker intentionally do NOT hard-depend on it.
#
# CONTRACT: the service names (postgres, redis, migrate, api, worker, searxng),
# the API port (8000), the SearXNG service address (http://searxng:8080), and the
# env-var names below are relied on by later infra and backend stories. The API
# healthcheck depends on FTY-012's `GET /healthz` shape.

name: fatty

services:
  postgres:
    # Pinned image per the security baseline's pinned-dependency principle.
    image: postgres:16.4-alpine
    restart: unless-stopped
    env_file:
      - .env
    # No host port published by default (FTY-109). See the port-exposure comment
    # at the top of this file if you need direct host access.
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    # No host port published by default (FTY-109). See the port-exposure comment
    # at the top of this file if you need direct host access.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ./backend
    # One-shot Alembic migration runner. Applies all pending migrations to HEAD
    # before the API and worker start, so a clean checkout reaches a fully
    # migrated schema without manual intervention (FTY-072 first-boot contract).
    command: [".venv/bin/alembic", "upgrade", "head"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    # Pin the in-container bind so the host port mapping below is stable
    # regardless of any FATTY_HOST/FATTY_PORT set in .env. Only the published
    # host port is configurable (API_PORT), to avoid host port conflicts.
    environment:
      FATTY_HOST: "0.0.0.0"
      FATTY_PORT: "8000"
      # Claude Code session directory (FTY-088). The claude-config volume below
      # persists the operator's 'claude login' session across restarts. This
      # env var tells the Claude Code CLI where to find its config; it is not
      # a secret — only the files written by 'claude login' inside the volume
      # are sensitive. The volume is a host secret: restrict its permissions
      # and never copy it into the image or commit it.
      CLAUDE_CONFIG_DIR: "/claude-config"
      # Codex CLI state directory (FTY-296). The codex-config volume below
      # persists auth.json, sessions, logs, and other Codex state across restarts
      # for the codex LLM provider. This env var is not a secret by itself; the
      # mounted volume contents are a host secret and must never be copied into
      # the image, committed, or included in support bundles.
      CODEX_HOME: "/codex-config"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # Persistent Claude Code session volume (FTY-088). Populated once by
      # running 'claude login' interactively (see README Self-Hosting section).
      # Survives 'docker compose down && up' without re-login.
      - claude-config:/claude-config
      # Persistent Codex CLI state volume (FTY-296). Populated once by
      # 'codex login' / device auth / access-token login in the container, or
      # bypassed per-run by FATTY_LLM_API_KEY. Treat as a host secret.
      - codex-config:/codex-config
    # Wait for migrations to complete and datastores to be healthy before starting.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - "CMD"
        - ".venv/bin/python"
        - "-c"
        - "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status == 200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ./backend
    # Same image as the API; run the Celery worker instead of the web server.
    # No task definitions exist yet (FTY-011 non-goal); the worker connects to
    # the Redis broker and idles, ready for later estimator stories.
    command: [".venv/bin/celery", "-A", "app.worker:celery_app", "worker", "--loglevel=info"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Claude Code session directory — same volume as the API so both services
      # share the single session created by 'claude login' (FTY-088).
      CLAUDE_CONFIG_DIR: "/claude-config"
      # Codex CLI state directory — same volume as the API so both services share
      # the single auth/session store created by 'codex login' (FTY-296).
      CODEX_HOME: "/codex-config"
    volumes:
      - claude-config:/claude-config
      - codex-config:/codex-config
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - "CMD-SHELL"
        - ".venv/bin/celery -A app.worker:celery_app inspect ping 2>/dev/null | grep -q 'pong'"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  searxng:
    # Private, keyless metasearch service backing the official-source search
    # adapter (FTY-164). Internal backend tool only — see the SearXNG note and
    # the port-exposure note at the top of this file. Pinned to an exact tag per
    # the security baseline's pinned-dependency principle.
    image: searxng/searxng:2026.6.30-d115c61a7
    restart: unless-stopped
    # No host port published by default: the api and worker reach it over the
    # internal compose network at http://searxng:8080. Exposing SearXNG to the
    # host or the public internet is out of scope (FTY-165) and would require a
    # separate, explicit operator story.
    environment:
      # Public base URL used only for correct inbound links; the internal compose
      # address is all any caller uses.
      SEARXNG_BASE_URL: "http://searxng:8080/"
    volumes:
      # Minimal private-instance config (JSON output enabled + dev placeholder
      # secret). Mounted read-only: the container never needs to write it, and
      # the file carries no real secret. The image's entrypoint sees the file
      # already exists and skips its random-key template step, keeping the dev
      # stack reproducible.
      - ./searxng:/etc/searxng:ro
    healthcheck:
      # Poll SearXNG's own liveness endpoint. Uses the image's bundled venv
      # Python (no curl/wget dependency), mirroring the api healthcheck style.
      test:
        - "CMD"
        - "/usr/local/searxng/.venv/bin/python"
        - "-c"
        - "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/healthz').status == 200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
  # Claude Code session / config directory (FTY-088). Shared by api and worker.
  # Populated once by 'docker compose exec api claude login' (or 'run --rm api
  # claude login'). Treat this volume as a host secret: it contains OAuth
  # credentials written by 'claude login'. Never copy its contents into the
  # image or commit them. Restrict host-path permissions if bind-mounting.
  claude-config:
  # Codex CLI state directory (FTY-296). Shared by api and worker.
  # Populated once by 'docker compose exec api codex login',
  # 'codex login --device-auth', or
  # 'printf %s "$CODEX_ACCESS_TOKEN" | codex login --with-access-token'.
  # Treat this volume as a host secret: it may contain auth.json access tokens,
  # sessions, logs, and other Codex state. Never copy its contents into the image,
  # commit them, or include them in support artifacts. Restrict host-path
  # permissions if bind-mounting.
  codex-config:

# Docker Compose stack for the Fatty backend (FTY-011, self-host setup FTY-072).
#
# Brings up Postgres, Redis, a one-shot Alembic migration runner, the FastAPI
# API, and a Celery worker over plain HTTP:
#
#     cp .env.example .env           # copy template; fill in FATTY_AUTH_SECRET
#     docker compose up              # starts all services; migrations run first
#
# First-boot: the `migrate` service runs `alembic upgrade head` before the API
# and worker start, so the schema is ready without manual intervention.
#
# Self-host scope: HTTP-only local deployment. TLS / reverse proxy / HTTPS
# termination, production hardening, resource limits, and cloud deployment are
# intentionally out of scope. See the README self-host section for details.
#
# The real `.env` is gitignored; only `.env.example` is committed.
#
# CONTRACT: the service names (postgres, redis, migrate, api, worker), the API
# port (8000), and the env-var names below are relied on by later infra and
# backend stories. The API healthcheck depends on FTY-012's `GET /healthz` shape.

name: fatty

services:
  postgres:
    # Pinned image per the security baseline's pinned-dependency principle.
    image: postgres:16.4-alpine
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ./backend
    # One-shot Alembic migration runner. Applies all pending migrations to HEAD
    # before the API and worker start, so a clean checkout reaches a fully
    # migrated schema without manual intervention (FTY-072 first-boot contract).
    command: [".venv/bin/alembic", "upgrade", "head"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./backend
    env_file:
      - .env
    # Pin the in-container bind so the host port mapping below is stable
    # regardless of any FATTY_HOST/FATTY_PORT set in .env. Only the published
    # host port is configurable (API_PORT), to avoid host port conflicts.
    environment:
      FATTY_HOST: "0.0.0.0"
      FATTY_PORT: "8000"
      # Claude Code session directory (FTY-088). The claude-config volume below
      # persists the operator's 'claude login' session across restarts. This
      # env var tells the Claude Code CLI where to find its config; it is not
      # a secret — only the files written by 'claude login' inside the volume
      # are sensitive. The volume is a host secret: restrict its permissions
      # and never copy it into the image or commit it.
      CLAUDE_CONFIG_DIR: "/claude-config"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # Persistent Claude Code session volume (FTY-088). Populated once by
      # running 'claude login' interactively (see README Self-Hosting section).
      # Survives 'docker compose down && up' without re-login.
      - claude-config:/claude-config
    # Wait for migrations to complete and datastores to be healthy before starting.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - "CMD"
        - ".venv/bin/python"
        - "-c"
        - "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status == 200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ./backend
    # Same image as the API; run the Celery worker instead of the web server.
    # No task definitions exist yet (FTY-011 non-goal); the worker connects to
    # the Redis broker and idles, ready for later estimator stories.
    command: [".venv/bin/celery", "-A", "app.worker:celery_app", "worker", "--loglevel=info"]
    env_file:
      - .env
    environment:
      # Claude Code session directory — same volume as the API so both services
      # share the single session created by 'claude login' (FTY-088).
      CLAUDE_CONFIG_DIR: "/claude-config"
    volumes:
      - claude-config:/claude-config
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres-data:
  # Claude Code session / config directory (FTY-088). Shared by api and worker.
  # Populated once by 'docker compose exec api claude login' (or 'run --rm api
  # claude login'). Treat this volume as a host secret: it contains OAuth
  # credentials written by 'claude login'. Never copy its contents into the
  # image or commit them. Restrict host-path permissions if bind-mounting.
  claude-config:

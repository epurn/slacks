# FTY-269: shared subflow — deterministically clears the iOS system "Open in
# Fatty?" confirmation that `openLink` can surface on a fresh simulator, without
# masking a real failure.
#
# On iOS, `openLink` can trigger a one-time OS confirmation the first time the
# app is opened via its custom URL scheme on a given simulator (accepting it is
# a permanent per-simulator choice — see docs.maestro.dev/reference/commands-
# available/openlink). A cold/just-erased simulator can take noticeably longer
# than Maestro's default ~7s visibility timeout to present that first alert, so
# the `optional` wait below allows up to 10s (rather than relying on the shorter
# default) for the exact `Open in "Fatty"` alert to appear. On Android, or an
# iOS simulator that already accepted the dialog, that wait warn-and-continues
# as a no-op with no try-catch swallowing a real failure.
#
# The confirming tap is then GATED on that same exact alert being visible via a
# conditional `runFlow`: the "Open" tap runs only when the known system
# confirmation is present, so it can never interact with an app-owned "Open"
# control when the dialog is absent. When the alert is not present (Android /
# already-accepted iOS) the conditional block is skipped entirely — the tap
# never fires. Nothing here swallows a preset that fails to load: the next
# `extendedWaitUntil` on the preset's settled marker still fails a genuine
# regression normally.
#
# Every openLink call in this directory's visual-review flows runs this right
# after, so the dialog can never block reaching the settled marker.
appId: com.fatty
---
- extendedWaitUntil:
    visible:
      text: 'Open in "Fatty"'
    timeout: 10000
    optional: true
- runFlow:
    when:
      visible:
        text: 'Open in "Fatty"'
    commands:
      - tapOn:
          text: "Open"

# FTY-269: shared subflow — deterministically clears the iOS system "Open in
# Fatty?" confirmation that `openLink` can surface on a fresh simulator, without
# masking a real failure and without ever tapping an app-owned control.
#
# On iOS, `openLink` can trigger a one-time OS confirmation the first time the
# app is opened via its custom URL scheme on a given simulator (accepting it is
# a permanent per-simulator choice — see docs.maestro.dev/reference/commands-
# available/openlink). In this directory's flows `launchApp` always precedes the
# first `openLink`, so the app is already warm when the scheme fires and the
# alert renders within a few seconds; the `optional` wait below gives it up to
# 10s and, being `optional`, WARN-and-continues (never failing the flow) on an
# already-accepted iOS simulator where the alert never appears.
#
# Platform gate — the important part for Android. The whole body runs inside a
# `runFlow` gated on `platform: iOS`. The "Open in Fatty?" confirmation is an
# iOS-only system dialog; Android's `openLink` never surfaces it. Gating the
# body means Android evaluates one instant, false platform check and skips the
# entire subflow — it does NOT enter the 10s `optional` wait. That keeps the
# Android visual-review launch path unchanged: every `openLink` on Android
# still flows straight into its settled-marker wait with no added delay, so the
# retained `mobile-e2e` Android suite pays nothing for this helper. (An earlier
# revision left the wait un-gated, so Android sat through a 10s WARN wait after
# every `openLink` — the regression this gate removes.)
#
# Selector — the important part for iOS. Maestro's `text:` is a FULL-MATCH
# regex, and iOS renders the alert title with smart quotes: `Open in “Fatty”?`.
# A literal `Open in "Fatty"` (straight quotes, no trailing `?`) therefore never
# matches, so an earlier revision's wait always warned and its `when:` gate never
# fired — leaving the dialog up on a cold simulator regardless of timing. `Open
# in .Fatty.*` is quote-agnostic (`.` matches either the smart or straight quote)
# and full-match-safe (`.*` absorbs the trailing `?`), so it matches the real
# system alert and the wait now resolves the instant the alert appears.
#
# Because the wait resolves ON the alert (not on timeout), the `when:` gate that
# follows sees it and taps — the tap is not a point-in-time snapshot racing a
# late-rendering alert. The gate also scopes the tap: `tapOn: Open` only fires
# while the exact system title is visible, so it can never hit an app-owned
# "Open" control, and `text: "Open"` full-matches only the alert's Open button
# (never the title, which is longer).
#
# Nothing here swallows a preset that fails to load: the accept only dismisses
# the known alert; the next `extendedWaitUntil` on the preset's settled marker
# remains the load-bearing assertion and still fails a genuine regression.
#
# Every openLink call in this directory's visual-review flows runs this right
# after, so on iOS the dialog can never block reaching the settled marker while
# on Android it is a zero-cost skip.
appId: com.fatty
---
- runFlow:
    when:
      platform: iOS
    commands:
      - extendedWaitUntil:
          visible:
            text: "Open in .Fatty.*"
          timeout: 10000
          optional: true
      - runFlow:
          when:
            visible:
              text: "Open in .Fatty.*"
          commands:
            - tapOn:
                text: "Open"

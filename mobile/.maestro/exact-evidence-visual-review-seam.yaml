# ─── exact_label — label capture from the flow + save-photo (default OFF) preview ───
# The label modal is a full-screen presentation on top of the sheet, so its
# framing hint and shutter are reachable on both platforms. Shooting the
# injected fixture photo (the seam's takePhoto) advances to the save-photo
# preview, where "Save this photo" defaults OFF.
- launchApp:
    clearState: false
- openLink: "slacks://__visual-review?preset=correction.exact_label&theme=light"
- runFlow: common/accept-open-in-slacks.yaml
- extendedWaitUntil:
    visible: "Fit the nutrition label inside the frame"
    timeout: 20000
- takeScreenshot: exact-label-framing-light
- tapOn:
    text: "Take photo"
- extendedWaitUntil:
    visible: "Save this photo"
    timeout: 20000
- takeScreenshot: exact-label-save-photo-off-light

# FTY-181: Target-reached beat (beat 3) — real data-path guard.
#
# The signature target-reached beat (beat 3) fires a success haptic + a gentle
# pulse once when the day's intake *crosses* the calorie target — a live
# crossing, never on an app opened already-over (the hero seeds "not yet
# reached" on its first ready render). This flow proves the crossing is reachable
# on the real screen: the hero mounts on the empty day (0 of 2,000 kcal → seeds
# not-reached), a single large log resolves, and the summary poll lands over
# target, flipping the hero to its over-budget end state — the visible companion
# of the beat.
#
# If the crossing were unreachable (summary never wired, or the hero re-seeded
# and swallowed the transition), the over-budget label would never appear and the
# assertion would go red — the gap this flow guards.
#
# Flow:
#   Today (empty day) → hero shows "0 of 2,000 kcal" (seeds not-reached) →
#   submit "holiday roast dinner" → it resolves to a completed entry → tap
#   Refresh so the day summary reloads over target → the hero crosses to
#   "2,100 of 2,000 kcal, 100 over budget".
#
# Bundle ID: Expo prebuild reads this from app.json. Keep this literal so
# directory-level Maestro runs launch the installed app under test reliably.
appId: com.fatty
---
# Step 1: Launch in E2E mode. The mock starts with an empty, zero-intake day.
- launchApp:
    clearState: false

# Step 2: Assert the app reaches Today and the timeline is in the ready state.
- extendedWaitUntil:
    visible:
      id: today-screen
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: today-timeline-ready
    timeout: 15000

# Step 3: The hero mounts under target on the empty day. This first ready render
#         is what seeds the beat's "not yet reached" baseline, so the later
#         crossing is a genuine transition (not a mount that buzzes).
- extendedWaitUntil:
    visible:
      text: ".*0 of 2,000 kcal.*"
    timeout: 10000

# Step 4: Submit a large entry — the mock resolves it straight to a completed
#         entry whose 2,100-kcal item pushes the day over the 2,000 target.
- tapOn:
    text: "Log food or exercise.*"
- inputText: "holiday roast dinner"
- tapOn:
    text: "Add entry"

# Step 5: Wait for the reconciled completed entry on the timeline.
- extendedWaitUntil:
    visible:
      id: today-timeline-with-entries
    timeout: 10000

# Step 6: Pull to refresh so the day summary reloads — now over target (2,100 kcal).
#         FTY-185 swapped the header Refresh button for the standard RefreshControl
#         pull, so the flow drags the timeline down from its top to trigger it.
- swipe:
    start: 50%, 35%
    end: 50%, 90%
    duration: 800

# Step 7: Load-bearing assertion — the hero crosses into its over-budget state.
#         The CalorieHero a11y label combines the figures into
#         "2,100 of 2,000 kcal, 100 over budget"; the crossing from under→over
#         is exactly what arms beat 3. A summary that never crossed would keep the
#         under-target "0 of 2,000 kcal" label and fail here.
- extendedWaitUntil:
    visible:
      text: ".*2,100 of 2,000 kcal.*"
    timeout: 10000
- assertVisible:
    text: ".*over budget.*"

# FTY-160 smoke flow: launch the E2E debug build and assert the app reaches Today.
#
# The app under test is a debug binary built with EXPO_PUBLIC_SLACKS_E2E=true
# (see verify-e2e.sh). On launch it:
#   - seeds a synthetic authenticated session (no live auth dependency),
#   - installs an in-process fetch mock returning hermetic fixtures,
#   - marks onboarding complete for the E2E user.
# AuthGate therefore routes straight to Today.
#
# Assertions, queried via the accessibility tree:
#   1. the Today ScrollView mounts (testID="today-screen"), and
#   2. its timeline reaches the ready, non-error state
#      (testID="today-timeline-ready" — the empty-day invite that only renders
#      once the log-events + daily-summary fixtures load without error).
#   3. the Today hero renders the calm empty-day full-budget copy.
#   4. after a log resolves and Refresh loads the updated daily summary, the
#      hero renders the consumed / target kcal + percent status line.
# Asserting (2) as well as (1) is what makes the flow catch a data-starved Today:
# if a fixture 404s, the timeline renders the error state instead and this fails,
# rather than going green on the always-mounted ScrollView alone.
#
# Bundle ID: Expo prebuild reads this from app.json. Keep this literal so
# directory-level Maestro runs launch the installed app under test reliably.
appId: com.slacks
---
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      id: today-screen
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: today-timeline-ready
    timeout: 15000
# Hero assertions match the combined accessibility label, not the visual
# status-line text: the hero container is accessible={true} with its children
# hidden from the accessibility tree, so on iOS only the collapsed label
# ("0 of 2,000 kcal, 2,000 remaining") is exposed to Maestro. Android exposes
# the same label as contentDescription, so the label match passes on both
# platforms (same approach as clarify.yaml step 11).
- assertVisible:
    text: ".*0 of 2,000 kcal, 2,000 remaining.*"

# Secondary tier (FTY-179): macro chips read consumed-vs-target from the
# daily-summary target read-model. On the empty E2E day protein is 0 of its 150g
# target; each chip is accessible={true}, so Maestro sees the collapsed label.
# (The burn line only renders when active_calories > 0 — the E2E day has none, so
# it correctly stays absent and there is nothing to assert for it here.)
- assertVisible:
    text: ".*Protein 0 of 150 grams.*"

# Submit once to advance the E2E mock into its needs-detail phase, then submit a
# concrete follow-up. The second POST resolves the synthetic entry; Refresh
# reloads the resolved event list and non-zero daily summary.
- tapOn:
    text: "Log food or exercise.*"
- inputText: "coffee"
- tapOn:
    text: "Add entry"
- extendedWaitUntil:
    visible:
      id: today-timeline-with-entries
    timeout: 10000
- tapOn:
    text: "Log food or exercise.*"
- inputText: "coffee large"
- tapOn:
    text: "Add entry"
# FTY-185 swapped the header Refresh button for the standard RefreshControl pull,
# so the flow drags the timeline down from its top to trigger the refetch.
- swipe:
    start: 50%, 35%
    end: 50%, 90%
    duration: 800
- extendedWaitUntil:
    visible:
      text: ".*120 of 2,000 kcal, 6 percent, 1,880 remaining.*"
    timeout: 10000
# The resolved entry moves protein to 1g against its 150g target — the chip
# tracks the same non-zero daily summary the hero does.
- assertVisible:
    text: ".*Protein 1 of 150 grams.*"

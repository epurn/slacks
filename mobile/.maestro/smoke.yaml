# FTY-160 smoke flow: launch the E2E debug build and assert the app reaches Today.
#
# The app under test is a debug binary built with EXPO_PUBLIC_FATTY_E2E=true
# (see verify-e2e.sh). On launch it:
#   - seeds a synthetic authenticated session (no live auth dependency),
#   - installs an in-process fetch mock returning hermetic fixtures,
#   - marks onboarding complete for the E2E user.
# AuthGate therefore routes straight to Today.
#
# Assertions (both added in FTY-160), queried via the accessibility tree:
#   1. the Today ScrollView mounts (testID="today-screen"), and
#   2. its timeline reaches the ready, non-error state
#      (testID="today-timeline-ready" — the empty-day invite that only renders
#      once the log-events + daily-summary fixtures load without error).
# Asserting (2) as well as (1) is what makes the flow catch a data-starved Today:
# if a fixture 404s, the timeline renders the error state instead and this fails,
# rather than going green on the always-mounted ScrollView alone.
#
# Bundle ID: Expo prebuild reads this from app.json. Keep this literal so
# directory-level Maestro runs launch the installed app under test reliably.
appId: com.fatty
---
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      id: today-screen
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: today-timeline-ready
    timeout: 15000

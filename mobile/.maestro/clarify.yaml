# FTY-162: Clarify-flow regression guard.
#
# Drives the full clarify path to completion and fails if the sheet is
# data-starved — the exact class of bug that slipped through in FTY-149.
#
# Flow:
#   Today (empty day) → submit "coffee" → needs_clarification row appears →
#   tap row → clarify sheet opens with the seeded question + quick-pick chips →
#   tap the "Large" chip → answer round-trip resolves the SAME entry in place →
#   tap Refresh → entry counts in Today totals → cluster time renders "11:14 AM"
#   (FTY-174 Hermes meridiem regression guard).
#
# FTY-175 upgrade: the sheet now renders Fatty's real question + candidate
# quick-pick chips (FTY-170 payload), and a chip tap resolves via the first-class
# answer round-trip (POST /clarification/answers) — not a duplicate log create.
# This drives the chip path to completion end-to-end. The post-answer refresh
# serves E2E_CLARIFY_RESOLVED_EVENT — the SAME event id, raw phrase, and
# created_at as the needs_clarification fixture, now `completed` — so the
# post-refresh assertions (steps 12–14) genuinely prove same-entry, no-duplicate
# resolution, not just that "some" completed entry counts.
#
# Load-bearing assertion (step 6): the seeded question text must be visible in
# the sheet. If the sheet opens data-starved (no question), ClarifyMode shows
# the generic fallback instead and the assertVisible: fails — proving this test
# would have caught FTY-149 before it merged.
#
# Regression proof: remove `E2E_CLARIFICATION` from the mock (or empty its
# `questions` array) and the step-6 assertVisible for the question text goes
# red, confirming the harness catches the data-starved sheet.
#
# Bundle ID: Expo prebuild reads this from app.json. Keep this literal so
# directory-level Maestro runs launch the installed app under test reliably.
appId: com.fatty
---
# Step 1: Launch in E2E mode. The mock starts in phase 0 (empty day).
- launchApp:
    clearState: false

# Step 2: Assert the app reaches Today and the timeline is in the ready,
#         empty-day state (reuses the FTY-160 Today marker).
- extendedWaitUntil:
    visible:
      id: today-screen
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: today-timeline-ready
    timeout: 15000

# Step 3: Submit "coffee" — the mock POST handler transitions to phase 1 and
#         returns the needs_clarification event.
- tapOn:
    text: "Log food or exercise"
- inputText: "coffee"
- tapOn:
    text: "Add entry"

# Step 4: Wait for the timeline to show entries (optimistic event inserted
#         immediately, then reconciled to the needs_clarification event).
- extendedWaitUntil:
    visible:
      id: today-timeline-with-entries
    timeout: 10000

# Step 5: Assert the entry renders as "needs a detail" — legible and inviting,
#         not a silent zero (the FTY-149 outcome that this flow guards against).
- extendedWaitUntil:
    visible:
      text: "coffee, needs a detail, uncounted"
    timeout: 10000

# Step 6: Tap the row to open the clarify sheet.
- tapOn:
    id: add-a-detail-row

# Step 7: Assert the clarify sheet is open and shows the seeded question text.
#         This is the regression-proving assertion: a data-starved sheet would
#         show the generic fallback ("We need a detail to count this entry.")
#         instead, failing this check.
- extendedWaitUntil:
    visible:
      id: clarify-question
    timeout: 5000
- extendedWaitUntil:
    visible:
      text: ".*What size was the coffee.*"
    timeout: 5000

# Step 8: Assert the quick-pick chips rendered from the clarify payload
#         (FTY-170/175) — the "Large" candidate option is a tappable chip. A
#         chipless (data-starved) sheet would fail this before the tap.
- extendedWaitUntil:
    visible:
      text: "Large"
    timeout: 5000

# Step 9: Tap the "Large" chip. One tap resolves: the answer travels the FTY-170
#         answer round-trip (POST /clarification/answers), not a duplicate log
#         create — no keyboard, no free-text needed.
- tapOn:
    text: "Large"

# Step 10: Assert the needs-a-detail treatment dropped — the entry resolved in
#          place (needs_clarification → processing). The sheet closes and the
#          row leaves the "needs a detail" state without spawning a second row.
- extendedWaitUntil:
    notVisible:
      text: "coffee, needs a detail, uncounted"
    timeout: 10000

# Step 11: Tap Refresh to load the phase-2 fixture: the resolved event list —
#          the SAME event, now completed (E2E_CLARIFY_RESOLVED_EVENT) — and the
#          non-zero daily summary. (The manual refresh is needed because the
#          re-estimated event completes synchronously in the mock and there is
#          no polling window before the test asserts counts.)
- tapOn:
    text: "Refresh"

# Step 12: Assert the resolved entry is still on the timeline as the untouched
#          raw phrase ("coffee") with the needs-a-detail treatment gone. The
#          refreshed day-list carries exactly one event — the same id as the
#          needs_clarification fixture — so a duplicate row could only come from
#          a client-side create, which the next assertion's absence of a second
#          needs-detail/pending row (plus the same-id fixture, proven in
#          launchMode.test.ts) rules out.
- extendedWaitUntil:
    visible:
      text: "coffee"
    timeout: 10000
- assertNotVisible:
    text: "coffee, needs a detail, uncounted"

# Step 13: Assert the entry counts — the CalorieHero accessibility label
#          includes the consumed kcal from the E2E_RESOLVED_SUMMARY fixture
#          (120 kcal of 2,000 kcal). Maestro text matching is an anchored
#          regex over the whole node text, and the full hero label carries a
#          percent + remaining tail ("120 of 2,000 kcal, 6 percent, 1,880
#          remaining"), so the kcal phrase needs surrounding wildcards — same
#          as the step-7 question match.
- extendedWaitUntil:
    visible:
      text: ".*120 of 2,000 kcal.*"
    timeout: 10000

# Step 14: FTY-174 Hermes meridiem regression guard. The resolved fixture
#          event is pinned to 11:14 AM in the device's own timezone
#          (E2E_CLARIFY_RESOLVED_EVENT in e2e/fixtures.ts, inheriting the
#          clarify event's immutable created_at), so the timeline's cluster
#          time label must render exactly "11:14 AM". This runs on the real
#          Hermes engine — the environment where the old
#          toLocaleTimeString(..., { hour12: true }) path rendered the wrong
#          meridiem ("11:14 PM") while Node-based unit tests stayed green.
- extendedWaitUntil:
    visible:
      text: "11:14 AM"
    timeout: 10000
- assertNotVisible:
    text: "11:14 PM"

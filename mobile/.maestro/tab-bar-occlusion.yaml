# FTY-185: Tab-bar occlusion — running-app proof of the content-under-the-bar idiom.
#
# The tab bar is a floating, blurred `.ultraThin` overlay (`position: 'absolute'`,
# transparent background) and the Today timeline scrolls *beneath* it, dimming
# into the app-drawn `TabBarScrim` fade before its rows reach the tab labels.
# `_layout.test.tsx` and `TodayScreenTabBarOcclusion.test.tsx` prove the pieces at
# render level (the BlurView material, the reserved bottom clearance, the scrim's
# transparent→opaque surface ramp), but the story requires the visual/occlusion
# requirement be shown on the running app. This flow does that: it seeds a
# timeline taller than the screen, scrolls its rows under the floating bar, and
# asserts the tab labels and the dimming scrim stay pinned on top of the scrolled
# content — content passes *under* the bar rather than pushing it away or reading
# fully legible through the labels.
#
# The native `.ultraThin` blur itself is not in the accessibility tree, so the
# machine-assertable half of the occlusion is the app-drawn `TabBarScrim`
# (testID `tab-bar-scrim`) that dims content into the screen surface beneath the
# labels; this flow asserts that overlay renders over the scrolled timeline.
#
# The seed is submitted and loaded via the FTY-185 pull-to-refresh gesture, so
# this flow also re-proves the RefreshControl pull (not the removed header
# button) drives the refetch on a real device.
#
# Bundle ID: Expo prebuild reads this from app.json. Keep this literal so
# directory-level Maestro runs launch the installed app under test reliably.
appId: com.fatty
---
# Step 1: Launch in E2E mode. The mock starts with an empty day.
- launchApp:
    clearState: false

# Step 2: Reach Today in its ready, empty-day state.
- extendedWaitUntil:
    visible:
      id: today-screen
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: today-timeline-ready
    timeout: 15000

# Step 3: Submit the occlusion seed. The mock returns it pending first (a
#         skeleton), then resolves it to one completed event carrying a long list
#         of derived items — a timeline taller than one screen.
- tapOn:
    text: "Log food or exercise"
- inputText: "big mixed plate"
- tapOn:
    text: "Add entry"
- extendedWaitUntil:
    visible:
      id: today-timeline-with-entries
    timeout: 10000

# Step 4: Pull to refresh to load the completed item-forward feed (FTY-185: the
#         RefreshControl pull replaces the old header Refresh button).
- swipe:
    start: 50%, 35%
    end: 50%, 90%
    duration: 800

# Step 5: The long timeline is present — the top food row renders, and the tab
#         bar's own labels sit at the bottom over the content.
- extendedWaitUntil:
    visible:
      text: ".*Scrambled eggs, 180 kcal.*"
    timeout: 10000
- assertVisible:
    text: "Today tab"
- assertVisible:
    text: "Trends tab"

# Step 6: The app-drawn dimming fade renders over the bottom of the scroll
#         content, beneath the tab labels — the machine-assertable half of the
#         occlusion the native `.ultraThin` blur completes.
- assertVisible:
    id: "tab-bar-scrim"

# Step 7: Scroll the timeline up so lower rows slide beneath the floating tab
#         bar. The tab labels and the dimming scrim stay pinned on top of the
#         scrolled content — the content-under-the-bar occlusion, on device.
- swipe:
    start: 50%, 70%
    end: 50%, 20%
    duration: 600
- assertVisible:
    text: "Today tab"
- assertVisible:
    text: "Trends tab"
- assertVisible:
    id: "tab-bar-scrim"

# Step 8: Load-bearing assertion — the last food row is now reachable in the
#         scrolled viewport, proving the timeline scrolls *under* the tab bar
#         rather than dead-ending above it.
- extendedWaitUntil:
    visible:
      text: ".*Banana, 105 kcal.*"
    timeout: 10000

- assertVisible:
    id: "visual-review-settled:today.confirm_parsed"
- takeScreenshot: today-confirm-parsed-light

# correction.detail (light): the correction lane's seam (FTY-263) — the
# correction sheet opens directly over a synthetic resolved entry via the
# E2E-only initial-state seam, never a scripted tap, registered through this
# same registration API from components/correction/visualReviewSeam.ts. Its
# `visual-review-settled:correction.detail` marker is rendered INSIDE the
# correction sheet's modal subtree (CorrectionSheet), so it is reachable while
# the sheet is presented even though the medium detent leaves `today-screen`
# undimmed behind it. The marker only appears after the sheet + synthetic item
# have rendered.
- openLink: "fatty://__visual-review?preset=correction.detail&theme=light"
- runFlow: common/accept-open-in-fatty.yaml
- extendedWaitUntil:
    visible:
      id: "visual-review-settled:correction.detail"
    timeout: 20000
- assertVisible:
    text: ".*Oatmeal.*"
- takeScreenshot: correction-detail-light

# correction.typeahead (light): the Change-match panel opens directly at the
# large, DIMMED detent, with its candidate list already loaded from the shared
# source-candidates fixture — not the blank state a naive initial-mode-only seam
# would leave it in. This is the expanded-detent case that failed on PR #230:
# the shared navigator-level overlay marker was unreachable behind the dimmed
# native presentation. The marker now lives INSIDE the sheet's modal subtree and
# only appears once `candidatesLoading === false` with the candidate list
# painted, so this is the load-bearing wait on Android, where NativeSheet's
# `Modal` fallback keeps the in-modal subtree reachable — no animation-wait
# fallback there.
#
# iOS (FTY-272): the same large/dimmed native detent that makes this the
# expanded-detent case above also keeps its in-modal marker out of the iOS
# accessibility tree entirely — a ratified platform limit, not a regression
# (see docs/verification/FTY-263/README.md and this repo's
# e2e/visualReview/README.md "iOS marker-assertion scope"). So the marker wait
# is Android-only; iOS instead confirms the sheet itself is up (its own outer
# label, reachable on both platforms) before capturing the same evidence
# screenshot — the preset still opens and is still proven non-blank on iOS,
# just not through the unreachable in-modal marker.
- openLink: "fatty://__visual-review?preset=correction.typeahead&theme=light"
- runFlow: common/accept-open-in-fatty.yaml
- runFlow:
    when:
      platform: Android
    commands:
      - extendedWaitUntil:
          visible:
            id: "visual-review-settled:correction.typeahead"
          timeout: 20000
      - assertVisible:
          id: "visual-review-settled:correction.typeahead"
- runFlow:
    when:
      platform: iOS
    commands:
      - assertVisible:
          text: ".*Oatmeal.*"
- takeScreenshot: correction-typeahead-light


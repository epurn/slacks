# FTY-247 visual-review smoke flow: open named presets by deep link and wait for
# their settled markers — the reusable launcher future screen audits (FTY-235..241)
# and command-centre screenshot tooling consume instead of hand-writing temporary
# Maestro YAML.
#
# The app under test is the same E2E debug binary the other flows use
# (EXPO_PUBLIC_FATTY_E2E=true, see verify-e2e.sh). This flow adds no fixtures of
# its own: each preset seeds its synthetic state through the shared visual-review
# registry (e2e/visualReview/), forces a theme, navigates to its screen, and — once
# the screen has loaded and gone network-quiet — exposes the marker
# `visual-review-settled:<preset>`.
#
# Entry point contract (documented in e2e/visualReview/README.md):
#   fatty://__visual-review?preset=<name>&theme=light|dark
#
# It proves at least the three Acceptance-Criteria smoke presets:
#   - today.populated in light mode,
#   - trends.populated in dark mode,
#   - today.empty (an empty-state preset).
# Each `extendedWaitUntil` on the preset's settled marker is the load-bearing
# assertion: the marker only appears after navigation, data load, and theme have
# settled, so a data-starved or wrong-screen launch fails here rather than going
# green on the always-mounted shell. `takeScreenshot` captures the settled frame.
#
# Bundle ID: Expo prebuild reads this from app.json. Keep this literal so
# directory-level Maestro runs launch the installed app under test reliably.
appId: com.fatty
---
- launchApp:
    clearState: false

# today.populated (light): a resolved multi-item day + a counting hero.
- openLink: "fatty://__visual-review?preset=today.populated&theme=light"
- extendedWaitUntil:
    visible:
      id: "visual-review-settled:today.populated"
    timeout: 20000
- assertVisible:
    id: today-screen
- takeScreenshot: today-populated-light

# trends.populated (dark): the weight + adherence cards with synthetic data.
- openLink: "fatty://__visual-review?preset=trends.populated&theme=dark"
- extendedWaitUntil:
    visible:
      id: "visual-review-settled:trends.populated"
    timeout: 20000
- assertVisible:
    id: trends-screen
- takeScreenshot: trends-populated-dark

# today.empty (light): the calm empty-day invite, no entries, full budget.
- openLink: "fatty://__visual-review?preset=today.empty&theme=light"
- extendedWaitUntil:
    visible:
      id: "visual-review-settled:today.empty"
    timeout: 20000
- assertVisible:
    id: today-screen
- takeScreenshot: today-empty-light

# Signed-out reseed guard (FTY-247): the signed-out preset must NOT be sticky.
# Open today.signed_out — the E2E session store hydrates a null session, so the
# auth gate reaches the sign-in surface and the settled marker appears.
- openLink: "fatty://__visual-review?preset=today.signed_out&theme=light"
- extendedWaitUntil:
    visible:
      id: "visual-review-settled:today.signed_out"
    timeout: 20000
- assertVisible:
    id: auth-mode-segmented-control
- takeScreenshot: today-signed-out-light

# Switch back to a signed-in preset AFTER the signed-out one. This is the
# load-bearing regression assertion: activation remounts the SessionProvider,
# which reseeds the synthetic session from the now-active preset, so Today opens
# directly at runtime instead of staying on the cleared/signed-out session.
- openLink: "fatty://__visual-review?preset=today.populated&theme=light"
- extendedWaitUntil:
    visible:
      id: "visual-review-settled:today.populated"
    timeout: 20000
- assertVisible:
    id: today-screen
- takeScreenshot: today-populated-after-signed-out-light

# today.confirm_parsed (FTY-262, light): a Today-owned sub-state preset — no
# route param opens the parsed-confirmation sheet, so Today's own E2E-only
# initial-state seam (useLabelProposal) opens it on mount instead. Proves the
# per-screen seam join contract: registered through registerVisualReviewPreset
# from Today's own code, reached here exactly like any in-scope preset. The
# confirm sheet's modal sets accessibilityViewIsModal, so `today-screen`
# underneath is (correctly) unreachable while it is presented — assert the
# sheet's own content instead of the screen behind it.
- openLink: "fatty://__visual-review?preset=today.confirm_parsed&theme=light"
- extendedWaitUntil:
    visible:
      id: "visual-review-settled:today.confirm_parsed"
    timeout: 20000
- assertVisible:
    text: "Granola bar"
- assertVisible:
    id: "visual-review-settled:today.confirm_parsed"
- takeScreenshot: today-confirm-parsed-light

# trends.adherence_retry (light): the adherence-strip retry state (FTY-264),
# registered from the Trends lane through the FTY-247 API — a range-read error
# fixture, no scripted taps. Reachable purely through the deep link + fixture,
# same as every other preset above.
- openLink: "fatty://__visual-review?preset=trends.adherence_retry&theme=light"
- extendedWaitUntil:
    visible:
      id: "visual-review-settled:trends.adherence_retry"
    timeout: 20000
- assertVisible:
    id: trends-screen
- assertVisible:
    text: "Try again"
- takeScreenshot: trends-adherence-retry-light

# capture.barcode_granted (light): the barcode-scanner sub-state (FTY-268),
# registered from the Today/capture lane through the FTY-247 API. Opened via the
# story's E2E-only initial-state seam — the scanner is already up when the
# preset activates, no scripted "Scan barcode" tap — with the granted camera
# permission the E2E harness already mocks for every build (FTY-194).
- openLink: "fatty://__visual-review?preset=capture.barcode_granted&theme=light"
- extendedWaitUntil:
    visible:
      id: "visual-review-settled:capture.barcode_granted"
    timeout: 20000
- assertVisible:
    id: barcode-reticle
- takeScreenshot: capture-barcode-granted-light

# capture.label_guidance (light): the label-capture framing-guidance sub-state
# (FTY-268), opened via the same initial-state seam — no scripted "Capture
# label" tap.
- openLink: "fatty://__visual-review?preset=capture.label_guidance&theme=light"
- extendedWaitUntil:
    visible:
      id: "visual-review-settled:capture.label_guidance"
    timeout: 20000
- assertVisible:
    text: "Fit the nutrition label inside the frame"
- takeScreenshot: capture-label-guidance-light

# capture.confirm_parsed (light): the confirm-parsed-values sheet (FTY-268),
# seeded through the real label-proposal read (a registered fixture, no live
# upload, no camera) — no scripted capture taps.
- openLink: "fatty://__visual-review?preset=capture.confirm_parsed&theme=light"
- extendedWaitUntil:
    visible:
      id: "visual-review-settled:capture.confirm_parsed"
    timeout: 20000
- assertVisible:
    text: "Granola bar"
- assertVisible:
    text: "Not yet counted"
- takeScreenshot: capture-confirm-parsed-light

# onboarding.goal (FTY-266, light): an onboarding-owned sub-state preset — the
# wizard is component-local `step` state and never shown by default (the E2E
# harness marks onboarding complete at boot), so this preset both skips that
# seed and opens the wizard on step 1 via its own E2E-only initial-state seam.
# Proves the per-screen seam join contract from onboarding's own lane.
- openLink: "fatty://__visual-review?preset=onboarding.goal&theme=light"
- extendedWaitUntil:
    visible:
      id: "visual-review-settled:onboarding.goal"
    timeout: 20000
- assertVisible:
    text: "What's your goal?"
- takeScreenshot: onboarding-goal-light

# onboarding.measurements_formula (FTY-266, light): the wizard opens directly
# on step 2 with a prefilled form and a metabolic-formula variant selected.
- openLink: "fatty://__visual-review?preset=onboarding.measurements_formula&theme=light"
- extendedWaitUntil:
    visible:
      id: "visual-review-settled:onboarding.measurements_formula"
    timeout: 20000
- assertVisible:
    text: "Your body metrics"
- takeScreenshot: onboarding-measurements-formula-light

# onboarding.target_reveal (FTY-266, light): the wizard opens directly on step
# 3 with a synthetic, already-settled target reveal (no fade to wait out).
- openLink: "fatty://__visual-review?preset=onboarding.target_reveal&theme=light"
- extendedWaitUntil:
    visible:
      id: "visual-review-settled:onboarding.target_reveal"
    timeout: 20000
- assertVisible:
    id: reveal-hero
- takeScreenshot: onboarding-target-reveal-light

name: governance

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify governance files
        run: python scripts/verify-governance.py


name: mobile

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  mobile:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json
      - name: Verify mobile
        run: make mobile

  # Temporary transition job for repositories that still require the historical
  # `mobile-e2e` context. It deliberately does not build native code, boot an
  # emulator, install Maestro, or run mobile/verify-e2e.sh. The full suite moved
  # to .github/workflows/mobile-e2e.yml as non-required manual/scheduled evidence.
  mobile-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Explain E2E demotion
        run: |
          echo "FTY-248 demoted the full native Maestro suite from the required PR gate."
          echo "This compatibility job is intentionally lightweight and does not run E2E."
          echo "Repository admins must remove required status check 'mobile-e2e' and require 'mobile'."
          echo "Run the full suite from the non-required mobile-e2e workflow_dispatch/schedule path."

name: mobile

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  mobile:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json
      - name: Verify mobile
        run: make mobile

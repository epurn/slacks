name: reviewer-gate

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  pull_request_review:
    types: [submitted, dismissed, edited]

permissions:
  contents: read
  pull-requests: read

jobs:
  separate-reviewer:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Require approval from a non-author reviewer
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const latestByUser = new Map();
            for (const review of reviews) {
              latestByUser.set(review.user.login, review);
            }

            const approvals = [...latestByUser.values()].filter((review) => {
              return review.state === "APPROVED" && review.user.login !== pr.user.login;
            });

            if (approvals.length === 0) {
              core.setFailed("Merge requires at least one approval from a reviewer other than the PR author.");
            } else {
              core.info(`Found separate reviewer approval from ${approvals.map((r) => r.user.login).join(", ")}.`);
            }


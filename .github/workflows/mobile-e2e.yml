name: mobile-e2e

on:
  workflow_dispatch:
  schedule:
    # Weekly non-required full-suite signal for the retained FTY-160 harness.
    - cron: "17 10 * * 1"

permissions:
  contents: read

jobs:
  full-mobile-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci
      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Cache AVD
        uses: actions/cache@v6
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-${{ runner.os }}
      - name: Create AVD snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."
      - name: Build, install, and run Maestro flows (attempt 1)
        id: e2e_attempt_1
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        env:
          # Reuse the restored Gradle cache so the emulator build stays bounded.
          E2E_BUILD_CACHE: "1"
        with:
          api-level: 34
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save
          disable-animations: true
          working-directory: mobile
          # Fails this non-required evidence run if build, install, or any flow fails.
          script: |
            mkdir -p ../e2e-logs
            set -o pipefail
            # The software-GPU "Failed to find ColorBuffer" glitch is a host/guest
            # renderer message that never reaches verify-e2e.sh's stdout, so stream
            # the emulator logcat alongside it and grep that log for the signature.
            adb logcat -c || true
            adb logcat > ../e2e-logs/attempt-1-logcat.log 2>&1 &
            logcat_pid=$!
            status=0
            PLATFORM=android ./verify-e2e.sh 2>&1 | tee ../e2e-logs/attempt-1.log || status=$?
            kill "$logcat_pid" 2>/dev/null || true
            exit "$status"
      - name: Classify E2E attempt 1
        id: classify_attempt_1
        if: always()
        run: |
          if [[ "${{ steps.e2e_attempt_1.outcome }}" == "success" ]]; then
            echo "retry=false" >> "$GITHUB_OUTPUT"
            echo "failed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Only the emulator attempt actually running and failing is retry-eligible.
          # A skipped/cancelled outcome means a pre-emulator step failed, not an
          # emulator glitch, so don't emit a misleading emulator-retry log line.
          if [[ "${{ steps.e2e_attempt_1.outcome }}" != "failure" ]]; then
            echo "retry=false" >> "$GITHUB_OUTPUT"
            echo "failed=true" >> "$GITHUB_OUTPUT"
            echo "Full mobile E2E attempt 1 did not run (prior step failure); not an emulator glitch, so no retry."
            exit 0
          fi

          if grep -q "Failed to find ColorBuffer" e2e-logs/attempt-1.log e2e-logs/attempt-1-logcat.log 2>/dev/null; then
            echo "retry=true" >> "$GITHUB_OUTPUT"
            echo "failed=true" >> "$GITHUB_OUTPUT"
            echo "trigger=software-GPU ColorBuffer glitch" >> "$GITHUB_OUTPUT"
            echo "Retrying full mobile E2E attempt 2/2 after attempt 1 detected software-GPU ColorBuffer glitch."
            exit 0
          fi

          if [[ ! -f e2e-logs/attempt-1.log ]]; then
            echo "retry=true" >> "$GITHUB_OUTPUT"
            echo "failed=true" >> "$GITHUB_OUTPUT"
            echo "trigger=emulator boot/readiness failure" >> "$GITHUB_OUTPUT"
            echo "Retrying full mobile E2E attempt 2/2 after attempt 1 detected emulator boot/readiness failure."
            exit 0
          fi

          echo "retry=false" >> "$GITHUB_OUTPUT"
          echo "failed=true" >> "$GITHUB_OUTPUT"
      - name: Build, install, and run Maestro flows (attempt 2)
        id: e2e_attempt_2
        if: steps.classify_attempt_1.outputs.retry == 'true'
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        env:
          # Reuse the restored Gradle cache so the emulator build stays bounded.
          E2E_BUILD_CACHE: "1"
        with:
          api-level: 34
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save
          disable-animations: true
          working-directory: mobile
          # Retry only reaches this attempt after attempt 1 was classified as an emulator/graphics glitch.
          script: |
            mkdir -p ../e2e-logs
            set -o pipefail
            # Same capture as attempt 1: the ColorBuffer glitch signature rides the
            # emulator logcat, not verify-e2e.sh's stdout.
            adb logcat -c || true
            adb logcat > ../e2e-logs/attempt-2-logcat.log 2>&1 &
            logcat_pid=$!
            status=0
            PLATFORM=android ./verify-e2e.sh 2>&1 | tee ../e2e-logs/attempt-2.log || status=$?
            kill "$logcat_pid" 2>/dev/null || true
            exit "$status"
      - name: Record E2E result
        if: always()
        run: |
          if [[ "${{ steps.e2e_attempt_1.outcome }}" == "success" ]]; then
            echo "Full mobile E2E passed on attempt 1/2."
            exit 0
          fi

          if [[ "${{ steps.classify_attempt_1.outputs.retry }}" != "true" ]]; then
            echo "Full mobile E2E failed on attempt 1/2 without a retryable emulator/graphics glitch."
            exit 1
          fi

          if [[ "${{ steps.e2e_attempt_2.outcome }}" == "success" ]]; then
            echo "Full mobile E2E passed on attempt 2/2 after retry trigger: ${{ steps.classify_attempt_1.outputs.trigger }}."
            exit 0
          fi

          if grep -q "Failed to find ColorBuffer" e2e-logs/attempt-2.log e2e-logs/attempt-2-logcat.log 2>/dev/null; then
            echo "Full mobile E2E failed after attempt 2/2 with software-GPU ColorBuffer glitch still present."
          elif [[ ! -f e2e-logs/attempt-2.log ]]; then
            echo "Full mobile E2E failed after attempt 2/2 with emulator boot/readiness failure still present."
          else
            echo "Full mobile E2E failed on attempt 2/2 after retry trigger: ${{ steps.classify_attempt_1.outputs.trigger }}."
          fi
          exit 1
      - name: Upload Maestro artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-e2e-artifacts
          path: |
            ~/.maestro/tests/
            e2e-logs/
          if-no-files-found: ignore
          retention-days: 7

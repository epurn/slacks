version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dependency-patch:
        update-types:
          - "patch"
      dependency-minor:
        update-types:
          - "minor"

  # Mobile npm: Expo SDK 56 managed project.
  # Packages pinned by the SDK (expo, react, react-native, jest, etc.) and the eslint toolchain
  # are ignored here—they can only be advanced coherently via `expo install` or an SDK upgrade.
  # Dependabot ignores patch/minor bumps to prevent dead PRs that fail CI; a major expo bump
  # (the SDK upgrade tripwire) is allowed through to signal when a new SDK is available.
  # Independent mobile libraries still flow.
  - package-ecosystem: "npm"
    directory: "/mobile"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dependency-patch:
        update-types:
          - "patch"
      dependency-minor:
        update-types:
          - "minor"
    ignore:
      # SDK-pinned packages; advance via SDK upgrade
      # Major expo bumps (new SDK) are the upgrade tripwire—they are allowed through to signal
      # when a new SDK is available. The failing CI is intentional; run `expo install --fix` when it appears.
      - dependency-name: "expo"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "react-native"
      - dependency-name: "react-test-renderer"
      - dependency-name: "jest"
      - dependency-name: "jest-expo"
      - dependency-name: "@types/jest"
      # eslint toolchain; major bumps break CI (incompatibility with SDK versions)
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "eslint-plugin-*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@typescript-eslint/*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5


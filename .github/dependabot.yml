version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dependency-patch:
        update-types:
          - "patch"
      dependency-minor:
        update-types:
          - "minor"

  # Mobile npm: Expo SDK 56 managed project.
  # In an Expo managed project, the entire JS dependency set is governed by `expo install`:
  # all expo-* modules, the @react-native/* toolchain, Expo-pinned react-native-* libs,
  # React type packages, and the SDK-tied eslint config move as a coherent unit.
  # Enumerating them individually leaked: we use prefix wildcards to cover the Expo-managed surface.
  # Security trade-off (stated plainly): GitHub applies `ignore` to BOTH version updates AND security
  # updates, so the blanket dependency-name ignores below intentionally suppress automated security-update
  # PRs for the ignored Expo-managed packages. Vulnerabilities are still surfaced as Dependabot *alerts*
  # (the repo Security tab, which is not governed by this file) and are remediated by `expo install --fix`
  # or an SDK upgrade — not by Dependabot opening a fix PR against an individually-pinned package.
  # A major expo bump still flows (the SDK upgrade tripwire from FTY-125), and independent deps like
  # typescript still flow. The upgrade path: run `expo install --fix` when a new SDK is available.
  - package-ecosystem: "npm"
    directory: "/mobile"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dependency-patch:
        update-types:
          - "patch"
      dependency-minor:
        update-types:
          - "minor"
    ignore:
      # Expo-managed surface: governed by `expo install`, not individual updates
      - dependency-name: "expo-*"
      - dependency-name: "@expo/*"
      - dependency-name: "@react-native/*"
      - dependency-name: "react-native-*"
      - dependency-name: "@types/react*"
      - dependency-name: "eslint-config-expo"
      # SDK-pinned packages; advance via SDK upgrade
      # Major expo bumps (new SDK) are the upgrade tripwire—they are allowed through to signal
      # when a new SDK is available. The failing CI is intentional; run `expo install --fix` when it appears.
      - dependency-name: "expo"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "react-native"
      - dependency-name: "react-test-renderer"
      - dependency-name: "jest"
      - dependency-name: "jest-expo"
      - dependency-name: "@types/jest"
      # eslint toolchain; major bumps break CI (incompatibility with SDK versions)
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "eslint-plugin-*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@typescript-eslint/*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

